name: tiny-transport

services:
  app:
    build:
      context: .
    ports:
      - "8000:80"
    environment:
      APP_NAME: "Tiny Transport"
      APP_ENV: local
      APP_KEY: "base64:QOwG5GAuQ9YYGCETHUD9PtA16NlCr6K0PgKep35gf54="
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      LOG_CHANNEL: daily
      LOG_LEVEL: debug
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: tiny_transport
      DB_USERNAME: tatransport
      DB_PASSWORD: tatransport
      CACHE_DRIVER: file
      FILESYSTEM_DISK: local
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: file
      SESSION_LIFETIME: 3600
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    ports:
      - "33306:3306"
    environment:
      MYSQL_DATABASE: tiny_transport
      MYSQL_USER: tatransport
      MYSQL_PASSWORD: tatransport
      MYSQL_ROOT_PASSWORD: eggdigital
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-peggdigital"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:
